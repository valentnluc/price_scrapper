name: Update Prices

on:
  schedule:
    - cron: '0 12 * * *' # Executes daily at 12:00 UTC (09:00 AM Argentina)
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout content
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python app.py

    - name: Generate Chart
      run: python generar_grafico.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add precios_historicos.csv grafico_precios.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update prices and chart" && git push)
