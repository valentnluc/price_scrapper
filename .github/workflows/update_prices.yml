name: Update Prices

on:
  schedule:
    - cron: '0 12 * * *' # Executes daily at 12:00 UTC (09:00 AM Argentina)
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit and push back to the repo

    steps:
    - name: Checkout content
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python app.py

    - name: Generate Chart
      run: python generar_grafico.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        # Use --ignore-errors to skip files that don't exist (e.g. errores.csv on a clean run)
        git add precios_historicos.csv grafico_precios.html
        git add errores.csv 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: prices, chart and errors [$(date +'%Y-%m-%d')]" && git push)
